<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satu Data Polanharjo | Portal Informasi & GIS</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>

    <style>
        :root { --bg-dark: #0f172a; --bg-card: #1e293b; --glass: rgba(15, 23, 42, 0.95); --accent: #f59e0b; --primary: #3b82f6; --text: #f8fafc; --transition: all 0.3s ease; }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text); overflow-x: hidden; }
        .page-view { display: none; width: 100%; }
        .page-view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); padding: 0 20px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin-bottom: 15px; background: linear-gradient(to right, #ffffff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .explore-btn { padding: 16px 38px; background: var(--accent); color: white; text-decoration: none; border-radius: 50px; font-weight: 800; display: inline-flex; align-items: center; gap: 10px; border: none; cursor: pointer; font-size: 1rem; transition: var(--transition); }
        .explore-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4); }

        /* Section & Data */
        .section-container { max-width: 1200px; margin: 0 auto; padding: 80px 20px; }
        .section-title { text-align: center; margin-bottom: 50px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .stat-card { background: var(--bg-card); padding: 30px 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .data-wrapper { display: flex; flex-wrap: wrap; gap: 40px; margin-bottom: 80px; }
        .data-chart { flex: 1; min-width: 350px; background: var(--bg-card); padding: 30px; border-radius: 20px; }
        .data-text { flex: 1; min-width: 350px; }
        .btn-excel { display: inline-flex; align-items: center; gap: 8px; background: #10b981; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        
        /* Map UI */
        #map-container { height: 100vh; width: 100vw; position: relative; }
        .gis-nav { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 96%; background: var(--glass); padding: 15px 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.15); display: flex; justify-content: space-between; align-items: center; z-index: 2000; color: white; }
        .sidebar { position: absolute; top: 100px; left: 2%; width: 350px; background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 25px; z-index: 2000; max-height: 80vh; overflow-y: auto; color: white; }
        .btn-upload { width: 100%; background: var(--primary); color: white; padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 15px; border: none; font-weight: bold; }
        .layer-item { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 5px; padding: 12px; cursor: pointer; display: flex; justify-content: space-between; }
        #map { height: 100%; width: 100%; }
        .legend-box { position: absolute; bottom: 30px; right: 30px; background: var(--glass); padding: 15px; border-radius: 15px; color: white; z-index: 1000; }
    </style>
</head>
<body>

    <div id="halaman-beranda" class="page-view active">
        <section class="hero">
            <h1>Sistem Spasial Polanharjo</h1>
            <p>Portal Informasi Publik dan Data Spasial Interaktif.</p>
            <button class="explore-btn" onclick="bukaPeta()">BUKA PETA GIS</button>
        </section>
        
        <section class="section-container" id="data-interaktif">
            <div class="section-title"><h2>Data <span>Sektoral</span></h2></div>
            <div class="stats-grid">
                <div class="stat-card"><h3>41.320</h3><p>Penduduk</p></div>
                <div class="stat-card"><h3>1.803</h3><p>Sawah (Ha)</p></div>
                <div class="stat-card"><h3>18</h3><p>Desa</p></div>
            </div>
            <div class="data-wrapper">
                <div class="data-chart"><canvas id="plChart"></canvas></div>
                <div class="data-text">
                    <p>Analisis spasial menunjukkan dominasi sektor pertanian di Polanharjo.</p>
                    <a href="data/data_lahan.xlsx" class="btn-excel">Unduh Excel</a>
                </div>
            </div>
        </section>
    </div>

    <div id="halaman-peta" class="page-view">
        <div id="map-container">
            <nav class="gis-nav">
                <div class="brand">WEBGIS POLANHARJO</div>
                <button onclick="tutupPeta()" class="btn btn-primary">KEMBALI</button>
            </nav>
            <aside class="sidebar" id="sidebar">
                <button class="btn-upload" onclick="document.getElementById('fileUpload').click()">Upload Data</button>
                <input type="file" id="fileUpload" style="display:none;" onchange="handleFileUpload(event)">
                <div class="layer-item" onclick="toggleGeoJsonLayer('pl', 'pl_polan.geojson')">Penggunaan Lahan</div>
                <div id="user-layers-container"></div>
            </aside>
            <div id="map"></div>
            <div class="legend-box" id="legend">Legenda Peta</div>
        </div>
    </div>

    <script>
        // Init Map
        var map = L.map('map').setView([-7.6105, 110.6600], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        map.pm.addControls();

        // Navigasi
        function bukaPeta() {
            document.getElementById('halaman-beranda').classList.remove('active');
            document.getElementById('halaman-peta').classList.add('active');
            map.invalidateSize();
            initChart();
        }
        function tutupPeta() {
            document.getElementById('halaman-peta').classList.remove('active');
            document.getElementById('halaman-beranda').classList.add('active');
        }

        // Charts
        function initChart() {
            new Chart(document.getElementById('plChart'), {
                type: 'doughnut',
                data: { labels: ['Sawah', 'Permukiman'], datasets: [{ data: [70, 30], backgroundColor: ['#10b981', '#f87171'] }] }
            });
        }
        
        // Upload
        function handleFileUpload(e) {
            const reader = new FileReader();
            reader.onload = (ev) => L.geoJSON(JSON.parse(ev.target.result)).addTo(map);
            reader.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
