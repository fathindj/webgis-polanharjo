<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satu Data Polanharjo | Portal Informasi & GIS</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --glass: rgba(15, 23, 42, 0.85);
            --accent: #f59e0b;
            --primary: #3b82f6;
            --text: #f8fafc;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text); overflow-x: hidden; }
        body.locked { overflow: hidden; }
        .page-view { display: none; width: 100%; }
        .page-view.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* (Style login, hero, profil dll tetap sama seperti sebelumnya...) */
        .gis-nav { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 95%; background: var(--glass); backdrop-filter: blur(20px); padding: 12px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 2000; color: white; }
        .sidebar { position: absolute; top: 90px; left: -400px; width: 340px; background: var(--glass); backdrop-filter: blur(25px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding: 25px; z-index: 2000; transition: var(--transition); max-height: calc(100vh - 120px); overflow-y: auto; color: white; }
        .sidebar.active { left: 2.5%; }
        .layer-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; transition: var(--transition); overflow: hidden; }
        .layer-item.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .layer-header { padding: 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .dl-btn { color: var(--primary); margin-right: 10px; font-size: 1.1rem; cursor: pointer; }
        .status-dot { width: 8px; height: 8px; background: #475569; border-radius: 50%; }
        .layer-item.active .status-dot { background: var(--accent); }
        #map { height: 100vh; width: 100vw; }
        .attr-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .attr-table th { color: var(--accent); padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="locked">

    <div id="halaman-peta" class="page-view active">
        <nav class="gis-nav">
            <div class="brand">WEBGIS POLANHARJO</div>
            <div class="nav-controls"><button class="nav-btn-panel" onclick="toggleSidebar()">PANEL DATA</button></div>
        </nav>

        <aside class="sidebar" id="sidebar">
            <h3 style="color: var(--accent);">DATA EXPLORER</h3>
            <div class="layer-item" id="item-kecamatan">
                <div class="layer-header" onclick="toggleGeoJsonLayer('kecamatan', 'batas_kecamatan_ln.geojson')">
                    <span>Batas Kecamatan</span>
                    <i class="fas fa-cloud-arrow-down dl-btn" onclick="event.stopPropagation(); downloadData('batas_administrasi.zip')"></i>
                </div>
            </div>
            <div class="layer-item" id="item-desa">
                <div class="layer-header" onclick="toggleGeoJsonLayer('desa', 'batas_desa_ln.geojson')">
                    <span>Batas Desa</span>
                    <i class="fas fa-cloud-arrow-down dl-btn" onclick="event.stopPropagation(); downloadData('batas_administrasi.zip')"></i>
                </div>
            </div>
            <div class="layer-item" id="item-persil">
                <div class="layer-header" onclick="toggleGeoJsonLayer('persil', 'persil_polan.geojson')">
                    <span>Persil Tanah</span>
                    <i class="fas fa-cloud-arrow-down dl-btn" onclick="event.stopPropagation(); downloadData('persil_polan.zip')"></i>
                </div>
            </div>
            <div class="layer-item" id="item-pl">
                <div class="layer-header" onclick="toggleGeoJsonLayer('pl', 'pl_polan.geojson')">
                    <span>Penggunaan Lahan</span>
                    <i class="fas fa-cloud-arrow-down dl-btn" onclick="event.stopPropagation(); downloadData('pl_polan.zip')"></i>
                </div>
            </div>
        </aside>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-7.6105, 110.6600], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const layers = {};
        function toggleGeoJsonLayer(key, filename) {
            const itemNode = document.getElementById('item-' + key);
            if (layers[key]) {
                if (map.hasLayer(layers[key])) { map.removeLayer(layers[key]); itemNode.classList.remove('active'); }
                else { layers[key].addTo(map); itemNode.classList.add('active'); }
            } else {
                fetch('data/' + filename)
                    .then(r => r.json())
                    .then(data => {
                        layers[key] = L.geoJSON(data, {
                            onEachFeature: (f, l) => { if(f.properties) l.bindPopup(JSON.stringify(f.properties)); }
                        }).addTo(map);
                        itemNode.classList.add('active');
                    });
            }
        }
        function downloadData(filename) { window.open('data/' + filename); }
    </script>
</body>
</html>
