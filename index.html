<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satu Data Polanharjo | Portal Informasi & GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />

    <style>
        :root { --bg-dark: #0f172a; --glass: rgba(15, 23, 42, 0.85); --accent: #f59e0b; --primary: #3b82f6; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text); }
        
        /* CSS Tambahan untuk Legenda & Peta */
        .legend-box { background: var(--glass); backdrop-filter: blur(15px); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); width: 220px; color: white; font-size: 0.75rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .box { width: 14px; height: 14px; margin-right: 8px; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="halaman-peta" class="page-view active">
        <div id="map-container" style="height: 100vh; width: 100vw;">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

    <script>
        var map = L.map('map').setView([-7.6105, 110.6600], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- FUNGSI WARNA OTOMATIS (KLASIFIKASI) ---
        function getWarnaPL(jenis) {
            if (!jenis) return "#94a3b8";
            let j = jenis.toLowerCase();
            if (j.includes("sawah")) return "#10b981";
            if (j.includes("pemukiman")) return "#f87171";
            if (j.includes("tegalan")) return "#a3e635";
            return "#fbbf24";
        }

        function getWarnaPersil(status) {
            if (!status) return "#64748b";
            let s = status.toLowerCase();
            if (s.includes("shm")) return "#fcd34d";
            if (s.includes("hgb")) return "#fb923c";
            return "#3b82f6";
        }

        // --- LAYER PETA ---
        let geoJsonLayers = {};
        function loadLayer(key, filename, styleFunc) {
            fetch('data/' + filename)
                .then(r => r.json())
                .then(data => {
                    geoJsonLayers[key] = L.geoJSON(data, {
                        style: (f) => styleFunc(f.properties),
                        onEachFeature: (f, l) => l.bindPopup(JSON.stringify(f.properties))
                    }).addTo(map);
                    updateLegend();
                });
        }

        // --- LEGEND CONTROL ---
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function() {
            var div = L.DomUtil.create('div', 'legend-box');
            div.innerHTML = `<h4>Legenda</h4><div id="legend-content"></div>`;
            return div;
        };
        legend.addTo(map);

        function updateLegend() {
            let content = document.getElementById('legend-content');
            content.innerHTML = `
                <div class="legend-item"><div class="box" style="background:#10b981"></div> Sawah</div>
                <div class="legend-item"><div class="box" style="background:#f87171"></div> Pemukiman</div>
                <div class="legend-item"><div class="box" style="background:#fcd34d"></div> SHM</div>
                <div class="legend-item"><div class="box" style="background:#fb923c"></div> HGB</div>
            `;
        }

        // Panggil layer
        loadLayer('pl', 'pl_polan.geojson', (p) => ({fillColor: getWarnaPL(p.jenis), fillOpacity: 0.7, color: 'white', weight: 0.5}));
        loadLayer('persil', 'persil_polan.geojson', (p) => ({fillColor: getWarnaPersil(p.status), fillOpacity: 0.7, color: 'white', weight: 0.5}));

        // Toolbar Geoman (Digitasi)
        map.pm.addControls({ position: 'topright' });
    </script>
</body>
</html>
